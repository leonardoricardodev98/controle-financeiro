<!DOCTYPE html>
<html>
<head>
    <title>Editar Gasto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>Editar Gasto</h1>

<form action="/atualizar" method="post">

    <input type="hidden" name="id" th:value="${gasto.id}" />

    <input type="text" name="nome" th:value="${gasto.nome}" />

    <input type="number" step="0.01" name="valor" th:value="${gasto.valor}" />

    <input type="text" name="categoria" th:value="${gasto.categoria}" />

    <select name="tipo">

        <option value="ENTRADA" th:selected="${gasto.tipo == 'ENTRADA'}">
            Entrada
        </option>

        <option value="SAIDA" th:selected="${gasto.tipo == 'SAIDA'}">
            Saída
        </option>

    </select>

    <input type="date" name="data" th:value="${gasto.data}" />

    <button type="submit">Salvar</button>

</form>

<a href="/">Voltar</a>

</body>
</html>
